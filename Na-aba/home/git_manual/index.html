<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GitMaster Pro - 모바일 가이드</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="logo-area">
                <span class="logo-icon">Git</span>
                <h1>Master Pro</h1>
            </div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="명령어나 키워드 검색...">
                <span class="search-icon">🔍</span>
            </div>
        </header>

        <!-- Categories Nav -->
        <nav class="category-nav" id="category-nav">
            <button class="nav-item active" data-category="all">전체</button>
            <button class="nav-item" data-category="basic">기초</button>
            <button class="nav-item" data-category="local">작업</button>
            <button class="nav-item" data-category="remote">원격</button>
            <button class="nav-item" data-category="branch">브랜치</button>
            <button class="nav-item" data-category="pro">고급</button>
        </nav>

        <!-- Content Area -->
        <main class="content" id="content-area">
            <!-- Cards will be injected by JS -->
        </main>

        <!-- Bottom Navigation -->
        <footer class="bottom-nav">
            <div class="bottom-item active" id="btn-home">
                <div class="icon">🏠</div>
                <span>홈</span>
            </div>
            <div class="bottom-item" id="btn-flow">
                <div class="icon">🔄</div>
                <span>워크플로우</span>
            </div>
            <div class="bottom-item" id="btn-trouble">
                <div class="icon">🛠</div>
                <span>해결방법</span>
            </div>
        </footer>

        <!-- Modal for detail flow/trouble -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
